name: Deploy Laravel Inertia to Niagahoster

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PHP_VERSION: "8.4"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, bcmath, pdo_mysql, fileinfo, gd, zip
          coverage: none

      # 3️⃣ Install Composer
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # 4️⃣ Prepare deploy directory
      # npm run build dilakukan di lokal
      - name: Prepare deploy directory
        run: |
          mkdir deploy
          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude="storage" \
            --exclude="bootstrap/cache" \
            --exclude="tests" \
            ./ deploy/

      # 5️⃣ Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 10 -H -p 65002 178.16.132.119 >> ~/.ssh/known_hosts

      # 6️⃣ Deploy (AMAN)
      - name: Deploy to Niagahoster
        run: |
          rsync -avz --delete \
            --exclude=".env" \
            --exclude="storage" \
            --exclude="bootstrap/cache" \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            deploy/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_REMOTE_PATH }}

      # 7️⃣ Setup .env (TIDAK MENIMPA)
      - name: Setup environment file
        run: |
          ssh -p ${{ secrets.SSH_PORT }} \
          ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.SSH_REMOTE_PATH }}

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            sed -i 's|^APP_ENV=.*|APP_ENV=local|' .env
            sed -i 's|^APP_DEBUG=.*|APP_DEBUG=true|' .env
            sed -i 's|^APP_URL=.*|APP_URL=${{ secrets.APP_URL }}|' .env

            sed -i 's|^DB_HOST=.*|DB_HOST=${{ secrets.DB_HOST }}|' .env
            sed -i 's|^DB_DATABASE=.*|DB_DATABASE=${{ secrets.DB_DATABASE }}|' .env
            sed -i 's|^DB_USERNAME=.*|DB_USERNAME=${{ secrets.DB_USERNAME }}|' .env
            sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.DB_PASSWORD }}|' .env

            if ! grep -q "^APP_KEY=base64:" .env; then
              php artisan key:generate --force
            fi
          EOF

      # 8️⃣ Post deploy
      - name: Post-deploy Laravel commands
        run: |
          ssh -p ${{ secrets.SSH_PORT }} \
          ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.SSH_REMOTE_PATH }}

            php artisan optimize:clear
            php artisan optimize
            php artisan storage:link
            composer install
            php artisan migrate

            chmod -R 775 storage bootstrap/cache
          EOF

      # 9️⃣ Cleanup
      - name: Cleanup
        if: always()
        run: rm -rf deploy
